<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>航空英語挑戰：寫實埃及修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Microsoft JhengHei', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .stats-container { display: flex; justify-content: space-between; pointer-events: auto; }
        
        /* 修改：將題目框下移並縮小字體 */
        #question-box { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(4px);
            border-radius: 12px; 
            padding: 8px 20px; 
            text-align: center; 
            font-size: 18px; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            margin: auto auto 10px auto; /* margin-top: auto 將元素推向底部 */
            max-width: 85%; 
            pointer-events: auto; 
            border: 2px solid #3b82f6; 
            transition: all 0.3s; 
            color: #1e3a8a;
        }

        .heart { color: #ff4d4d; font-size: 30px; margin-right: 5px; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; z-index: 100; pointer-events: auto; text-align: center; }
        .btn { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; padding: 15px 50px; border-radius: 50px; font-size: 24px; cursor: pointer; border: none; margin-top: 20px; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5); }
        .btn:hover { transform: scale(1.05); }
        .damage-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.35); pointer-events: none; display: none; z-index: 50; }
        #phase-announcer { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 70px; font-weight: 900; text-shadow: 0 0 20px rgba(59, 130, 246, 0.8); pointer-events: none; opacity: 0; transition: opacity 0.5s; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stats-container">
        <div id="lives-display"></div>
        <div class="flex flex-col items-end">
            <div class="bg-white/90 px-4 py-1 rounded-full text-blue-600 font-bold shadow mb-2">
                得分: <span id="score">0</span>
            </div>
            <div id="phase-tag" class="bg-black/50 px-3 py-1 rounded text-white text-xs border border-white/30 backdrop-blur-sm">
                PHASE 1: STORM TRACKING
            </div>
        </div>
    </div>
    <!-- 題目框已設定在底部 -->
    <div id="question-box">準備起飛...</div>
</div>

<div id="phase-announcer">PHASE 1</div>

<div id="overlay">
    <h1 class="text-6xl font-black mb-6 italic bg-clip-text text-transparent bg-gradient-to-r from-amber-500 to-white uppercase">Steampunk Pilot</h1>
    <p class="text-xl mb-8 text-blue-100">血量總計 4 顆心！若完全消耗則會墜毀。<br>龍捲風頻率已增加，第三關飛碟將以三機編隊出現！<br>第二關 Sphinx 眼睛會追蹤飛機發射紅色閃電！</p>
    <button class="btn" onclick="startGame()">正式起飛</button>
</div>

<div id="damage-flash" class="damage-flash"></div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const questionBox = document.getElementById('question-box');
    const scoreDisplay = document.getElementById('score');
    const livesDisplay = document.getElementById('lives-display');
    const phaseTag = document.getElementById('phase-tag');
    const announcer = document.getElementById('phase-announcer');
    const overlay = document.getElementById('overlay');
    const flash = document.getElementById('damage-flash');

    // --- 圖片載入與安全偵測系統 ---
    function createImage(src, fallback) {
        const img = new Image();
        img.isReady = false;
        
        img.onload = () => { 
            img.isReady = true; 
            console.log(`資源載入成功: ${src}`);
        };
        
        img.onerror = () => {
            console.warn(`載入資源 ${src} 失敗，切換至備援路徑。`);
            img.isReady = false;
            if (fallback && img.src !== fallback) {
                img.crossOrigin = "anonymous";
                img.src = fallback;
            }
        };

        img.src = src;
        return img;
    }

    const planeImg = createImage('plane.png', 'https://i.ibb.co/V9m8S9n/steampunk-plane.png');
    const sphinxImg = createImage('sphinx.png', 'https://i.ibb.co/L5hY8pS/sphinx.png');
    const ufoImg = createImage('ufo.png', 'https://i.ibb.co/6P0qL9r/ufo.png');

    let gameActive = false;
    let score = 0;
    let lives = 4; 
    let currentQuestionIdx = 0;
    let plane = { x: 80, y: 80, w: 160, h: 90, targetX: 80, targetY: 80, angle: 0, isProtected: false };
    
    let obstacles = [];
    let words = [];
    let mountains = [];
    let backMountains = [];
    let stars = [];
    let lasers = [];
    let sphinxAttacks = []; 
    let runway = null;
    let frameCount = 0;
    let currentPhase = 1;
    let sphinxScrollX = 0;
    let scrollSpeed = 0; 
    let forceShelterOnNextMountain = false;

    const questions = [
        { q: "I want to ________ an apple.", options: ["eat", "drink"], correct: "eat" },
        { q: "The bird is ________ in the sky.", options: ["swimming", "flying"], correct: "flying" },
        { q: "She ________ to school every day.", options: ["goes", "go"], correct: "goes" },
        { q: "Look! It is ________ now.", options: ["raining", "sunny"], correct: "raining" },
        { q: "I like to ________ music.", options: ["listen", "watch"], correct: "listen" },
        { q: "My father ________ a doctor.", options: ["is", "are"], correct: "is" },
        { q: "They ________ playing soccer.", options: ["are", "am"], correct: "are" },
        { q: "We ________ to the park yesterday.", options: ["went", "go"], correct: "went" },
        { q: "Can you ________ me a hand?", options: ["give", "take"], correct: "give" },
        { q: "He is ________ than me.", options: ["taller", "tall"], correct: "taller" },
        { q: "Where ________ you from?", options: ["are", "is"], correct: "are" },
        { q: "This is ________ eraser.", options: ["an", "a"], correct: "an" },
        { q: "Don't ________ in the library.", options: ["shout", "read"], correct: "shout" },
        { q: "How ________ is this book?", options: ["much", "many"], correct: "much" },
        { q: "There ________ some milk.", options: ["is", "are"], correct: "is" },
        { q: "I ________ finished my homework.", options: ["have", "has"], correct: "have" },
        { q: "Please ________ your shoes.", options: ["remove", "open"], correct: "remove" },
        { q: "She is ________ English now.", options: ["studying", "study"], correct: "studying" },
        { q: "It's time ________ go to bed.", options: ["to", "for"], correct: "to" },
        { q: "Would you like ________ tea?", options: ["some", "any"], correct: "some" },
        { q: "I don't have ________ money.", options: ["any", "some"], correct: "any" },
        { q: "That is the ________ beautiful girl.", options: ["most", "more"], correct: "most" },
        { q: "If it ________ tomorrow, we'll stay home.", options: ["rains", "rain"], correct: "rains" },
        { q: "Have you ________ been to Japan?", options: ["ever", "never"], correct: "ever" },
        { q: "Success ________ hard work.", options: ["needs", "eat"], correct: "needs" }
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initMountains();
    }

    function initMountains() {
        mountains = [];
        backMountains = [];
        const count = 18;
        const step = canvas.width / (count - 1);
        for(let i=0; i<count + 10; i++) {
            backMountains.push({ x: i * step, h: 80 + Math.random() * 120 });
            mountains.push(generateOneMountain(i * step, i < 3 ? false : null));
        }
    }

    function generateOneMountain(xValue, forced = null) {
        let spawnShelter = false;
        if (forced !== null) {
            spawnShelter = forced;
        } else {
            if (forceShelterOnNextMountain) {
                spawnShelter = true;
                forceShelterOnNextMountain = false;
            } else {
                spawnShelter = Math.random() > 0.95; 
            }
        }
        return { 
            x: xValue, 
            h: 150 + Math.random() * 250, 
            seed: Math.random(),
            isSharp: Math.random() > 0.7,
            hasShelter: spawnShelter 
        };
    }

    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', (e) => {
        if (!gameActive) return;
        plane.targetX = e.clientX;
        plane.targetY = e.clientY;
    });

    const handleTouch = (e) => {
        if (!gameActive) return;
        const touch = e.touches[0];
        plane.targetX = touch.clientX;
        plane.targetY = touch.clientY;
        e.preventDefault();
    };
    window.addEventListener('touchstart', handleTouch, {passive: false});
    window.addEventListener('touchmove', handleTouch, {passive: false});

    function startGame() {
        gameActive = true; score = 0; lives = 4; currentQuestionIdx = 0; currentPhase = 1;
        obstacles = []; words = []; lasers = []; sphinxAttacks = []; runway = null; sphinxScrollX = 0;
        scrollSpeed = 0; frameCount = 0; forceShelterOnNextMountain = false;
        overlay.style.display = 'none';
        plane.x = 80; plane.y = 80; plane.targetX = 80; plane.targetY = 80;
        plane.isProtected = false;
        stars = Array.from({length: 100}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2.5 }));
        announcePhase(1); updateUI(); spawnNextQuestion();
        requestAnimationFrame(gameLoop);
    }

    function announcePhase(p) {
        currentPhase = p;
        announcer.innerText = `PHASE ${p}`; announcer.style.opacity = '1';
        setTimeout(() => announcer.style.opacity = '0', 2000);
        if(p===1) phaseTag.innerText = "Phase 1: Storm Tracking";
        if(p===2) phaseTag.innerText = "Phase 2: Sphinx Ruins";
        if(p===3) phaseTag.innerText = "Phase 3: Cosmic Void";
    }

    function updateUI() {
        scoreDisplay.innerText = score;
        const heartCount = Math.max(0, Math.floor(lives));
        livesDisplay.innerHTML = '❤️'.repeat(heartCount).split('').map(h => `<span class="heart">${h}</span>`).join('');
        if (currentQuestionIdx < questions.length) {
            questionBox.innerText = questions[currentQuestionIdx].q;
        }
    }

    function spawnNextQuestion() {
        if (currentQuestionIdx >= questions.length) return;
        if (currentQuestionIdx === 10 && currentPhase === 1) announcePhase(2);
        if (currentQuestionIdx === 17 && currentPhase === 2) announcePhase(3);
        
        words = []; 
        const q = questions[currentQuestionIdx];
        q.options.forEach((opt, i) => {
            words.push({ 
                text: opt, 
                x: canvas.width + 400 + (i * 500), 
                y: 150 + Math.random() * (canvas.height - 350), 
                w: 160, 
                h: 70, 
                correct: opt === q.correct 
            });
        });
    }

    function triggerFlash() { flash.style.display = 'block'; setTimeout(() => flash.style.display = 'none', 150); }

    function drawPeakShelter(mountX, mountY) {
        const sw = 130, sh = 105;
        const houseY = mountY - sh;
        ctx.save();
        ctx.translate(mountX, houseY);
        ctx.shadowBlur = 30; ctx.shadowColor = '#4ade80';
        ctx.fillStyle = '#525252'; 
        ctx.beginPath(); ctx.roundRect(-sw/2, 0, sw, sh, 2); ctx.fill();
        ctx.shadowBlur = 0; ctx.fillStyle = '#3f3f3f';
        for(let r=0; r<4; r++) {
            for(let c=0; c<3; c++) { ctx.fillRect(-sw/2 + 8 + (c*42), 10 + (r*24), 30, 18); }
        }
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-sw/2 - 15, 0, sw + 30, 15); 
        ctx.fillStyle = '#86efac'; 
        ctx.shadowBlur = 15; ctx.shadowColor = '#4ade80';
        ctx.fillRect(-28, 35, 56, sh - 35);
        ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.fillText('REFUGE', 0, -15);
        ctx.restore();
        if (plane.x > mountX - sw/2 && plane.x < mountX + sw/2 && plane.y > houseY && plane.y < mountY) {
            plane.isProtected = true;
        }
    }

    function drawRealisticMountains() {
        const groundY = canvas.height;
        ctx.fillStyle = 'rgba(101, 67, 33, 0.4)';
        ctx.beginPath(); ctx.moveTo(0, groundY);
        backMountains.forEach(m => { m.x -= (scrollSpeed * 0.3); ctx.lineTo(m.x, groundY - m.h); });
        ctx.lineTo(canvas.width + 500, groundY); ctx.fill();
        if (backMountains.length > 0 && backMountains[0].x < -stepX()) {
            let last = backMountains[backMountains.length - 1];
            backMountains.shift(); backMountains.push({ x: last.x + stepX(), h: 80 + Math.random() * 120 });
        }
        for (let i = 0; i < mountains.length - 1; i++) {
            let p1 = mountains[i]; let p2 = mountains[i+1];
            p1.x -= scrollSpeed;
            let midX = (p1.x + p2.x) / 2;
            let peakY = groundY - Math.max(p1.h, p2.h);
            if (p1.isSharp) peakY -= 50;
            let mGrad = ctx.createLinearGradient(0, peakY, 0, groundY);
            mGrad.addColorStop(0, '#78350f'); mGrad.addColorStop(1, '#331a00'); 
            ctx.fillStyle = mGrad;
            ctx.beginPath();
            ctx.moveTo(p1.x, groundY); ctx.lineTo(p1.x, groundY - p1.h);
            if (p1.isSharp) ctx.lineTo(midX, peakY - 20); else ctx.lineTo(midX, peakY);
            ctx.lineTo(p2.x, groundY - p2.h); ctx.lineTo(p2.x, groundY); ctx.fill();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; ctx.beginPath(); ctx.moveTo(midX, peakY); 
            let slantOffset = 50 + p1.seed * 100; ctx.lineTo(midX + slantOffset, groundY); ctx.lineTo(p2.x, groundY); ctx.lineTo(p2.x, groundY - p2.h); ctx.fill();
            if (p1.hasShelter) drawPeakShelter(midX, peakY);
        }
        if (mountains.length > 0 && mountains[0].x < -450) {
            let last = mountains[mountains.length - 1];
            mountains.shift(); mountains.push(generateOneMountain(last.x + stepX()));
        }
        let haze = ctx.createLinearGradient(0, groundY - 200, 0, groundY);
        haze.addColorStop(0, 'rgba(0, 0, 0, 0)'); haze.addColorStop(1, 'rgba(15, 23, 42, 0.8)');
        ctx.fillStyle = haze; ctx.fillRect(0, groundY - 200, canvas.width, 200);
    }
    function stepX() { return canvas.width / 14; }

    function drawStrongTornado(obs) {
        obs.x -= (scrollSpeed + 2.8); 
        obs.timer = (obs.timer || 0) + 1;
        const swirlCount = 18;
        const baseWidth = 100;
        const height = canvas.height * 1.3;
        ctx.save();
        if (!obs.particles) {
            obs.particles = Array.from({length: 25}, () => ({
                angle: Math.random() * Math.PI * 2, yRatio: Math.random(), speed: 0.1 + Math.random() * 0.3, size: 2 + Math.random() * 5
            }));
        }
        for (let i = 0; i < swirlCount; i++) {
            const hRatio = i / swirlCount;
            const currentY = canvas.height - (hRatio * height);
            const sway = Math.sin(obs.timer * 0.05 + hRatio * 5) * 50;
            const swirlWidth = baseWidth * (1 + hRatio * 4); 
            const rotation = (obs.timer * 0.18) + (i * 0.8);
            ctx.beginPath(); ctx.lineWidth = 2 + (1 - hRatio) * 3; ctx.strokeStyle = `rgba(180, 180, 200, ${0.1 + (1 - hRatio) * 0.5})`;
            ctx.ellipse(obs.x + sway, currentY, swirlWidth, 15 * (1 + hRatio), rotation, 0, Math.PI * 2); ctx.stroke();
            if (Math.abs(currentY - plane.y) < 40) { obs.lastSway = sway; obs.lastWidth = swirlWidth; }
        }
        obs.particles.forEach((p, idx) => {
            p.angle += p.speed;
            const y = canvas.height - (p.yRatio * height);
            const sway = Math.sin(obs.timer * 0.05 + p.yRatio * 5) * 50;
            const rad = baseWidth * (1 + p.yRatio * 4) * 0.8;
            ctx.fillStyle = idx % 2 === 0 ? '#444' : '#888';
            ctx.fillRect(obs.x + sway + Math.cos(p.angle) * rad, y, p.size, p.size);
        });
        ctx.restore();
        const planeDistX = Math.abs(plane.x - (obs.x + (obs.lastSway || 0)));
        if (planeDistX < (obs.lastWidth || baseWidth) * 0.8 + 30) {
            if (!plane.isProtected && !obs.hasHit) { 
                lives = Math.max(0, lives - 1); 
                obs.hasHit = true; triggerFlash(); updateUI(); checkGameOver();
            }
        }
    }

    function drawGizaSphinxRealistic(offsetX) {
        const groundY = canvas.height - 80;
        ctx.save();
        ctx.translate(-offsetX % (canvas.width * 2.5), 0);
        
        for(let loop = 0; loop < 2; loop++) {
            const startX = loop*(canvas.width * 2.5) + 400;

            const pyramids = [
                {x: startX - 300, w: 550, h: 380, light: '#fbbf24', shadow: '#b45309'},
                {x: startX + 200, w: 400, h: 300, light: '#f59e0b', shadow: '#92400e'}
            ];

            pyramids.forEach(p => {
                const midX = p.x + p.w * 0.42, topY = groundY - p.h;
                ctx.fillStyle = p.light; ctx.beginPath(); ctx.moveTo(p.x, groundY); ctx.lineTo(midX, topY); ctx.lineTo(midX, groundY); ctx.fill();
                ctx.fillStyle = p.shadow; ctx.beginPath(); ctx.moveTo(midX, topY); ctx.lineTo(p.x + p.w, groundY); ctx.lineTo(midX, groundY); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
                for(let h = 30; h < p.h; h += 40) {
                    const r = h / p.h; ctx.beginPath();
                    ctx.moveTo(p.x + r * (midX - p.x), groundY - h);
                    ctx.lineTo(p.x + p.w - r * (p.x + p.w - midX), groundY - h);
                    ctx.stroke();
                }
            });

            const sx = startX + 800, sy = groundY;
            if (sphinxImg.isReady || (sphinxImg.complete && sphinxImg.naturalWidth > 0)) {
                const sW = 600, sH = 400;
                ctx.drawImage(sphinxImg, sx - sW/2, sy - sH, sW, sH);

                const attack = sphinxAttacks.find(a => Math.abs(a.originalSx - (loop*(canvas.width * 2.5) + 1200)) < 20);
                if (attack) {
                    ctx.save();
                    const eyeY = sy - 340;
                    const eyeL = sx - 30;
                    const eyeR = sx + 30;

                    if (attack.state === 'charging') {
                        attack.targetX = plane.x;
                        attack.targetY = plane.y;
                        ctx.shadowBlur = 15 + Math.sin(frameCount * 0.2) * 10; 
                        ctx.shadowColor = 'yellow';
                        ctx.fillStyle = 'rgba(255, 255, 0, 0.8)';
                        ctx.beginPath(); ctx.arc(eyeL, eyeY, 10, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(eyeR, eyeY, 10, 0, Math.PI*2); ctx.fill();
                    } else if (attack.state === 'firing') {
                        ctx.shadowBlur = 20; ctx.shadowColor = 'red';
                        ctx.fillStyle = 'red';
                        ctx.beginPath(); ctx.arc(eyeL, eyeY, 12, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(eyeR, eyeY, 12, 0, Math.PI*2); ctx.fill();
                        drawLightningBolt(eyeL, eyeY, attack.targetX, attack.targetY);
                        drawLightningBolt(eyeR, eyeY, attack.targetX, attack.targetY);

                        if (!plane.isProtected && !attack.hasHit) {
                            const dist = distToSegment({x: plane.x, y: plane.y}, {x: eyeL, y: eyeY}, {x: attack.targetX, y: attack.targetY});
                            if (dist < 50) {
                                lives -= 0.5; attack.hasHit = true; triggerFlash(); updateUI(); checkGameOver();
                            }
                        }
                    }
                    ctx.restore();
                }
            } else {
                ctx.fillStyle = '#92400e'; ctx.fillRect(sx - 260, sy - 180, 520, 190);
                ctx.fillStyle = '#d97706'; ctx.fillRect(sx - 240, sy - 180, 480, 170);
                ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(sx, sy - 330, 110, 0, Math.PI * 2); ctx.fill();
            }
        }
        ctx.restore();
    }

    function drawLightningBolt(x1, y1, x2, y2) {
        ctx.save();
        ctx.strokeStyle = '#ff3333';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'red';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        let dx = x2 - x1;
        let dy = y2 - y1;
        let segments = 8;
        for (let i = 1; i < segments; i++) {
            let px = x1 + (dx / segments) * i + (Math.random() - 0.5) * 60;
            let py = y1 + (dy / segments) * i + (Math.random() - 0.5) * 60;
            ctx.lineTo(px, py);
        }
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.restore();
    }

    function distToSegment(p, v, w) {
        const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
        if (l2 === 0) return Math.sqrt(Math.pow(p.x - v.x, 2) + Math.pow(p.y - v.y, 2));
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.sqrt(Math.pow(p.x - (v.x + t * (w.x - v.x)), 2) + Math.pow(p.y - (v.y + t * (w.y - v.y)), 2));
    }

    function gameLoop() {
        if (!gameActive) return; frameCount++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        plane.isProtected = false; 

        let dx = (plane.targetX - plane.x) * 0.1;
        let dy = (plane.targetY - plane.y) * 0.1;
        scrollSpeed = dx > 0 ? dx * 1.6 : 0; 
        plane.x += dx; plane.y += dy;
        plane.angle = dy * 0.06;
        plane.x = Math.max(40, Math.min(canvas.width - 40, plane.x));
        plane.y = Math.max(40, Math.min(canvas.height - 40, plane.y));

        if (currentPhase === 1) {
            let g = ctx.createLinearGradient(0,0,0,canvas.height); g.addColorStop(0, '#0c4a6e'); g.addColorStop(1, '#bae6fd');
            ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width, canvas.height);
            drawRealisticMountains();
            let curM = mountains.find(m => Math.abs(m.x - plane.x) < 40);
            if(curM && plane.y > canvas.height - curM.h - (curM.isSharp ? 40 : 15)) { 
                if (!plane.isProtected) { lives -= 0.015; updateUI(); checkGameOver(); }
            }
        } else if (currentPhase === 2) {
            let dGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            dGrad.addColorStop(0, '#fef3c7'); dGrad.addColorStop(1, '#fde68a');
            ctx.fillStyle = dGrad; ctx.fillRect(0,0,canvas.width, canvas.height);
            sphinxScrollX += scrollSpeed; drawGizaSphinxRealistic(sphinxScrollX);

            if (frameCount % 320 === 0 && Math.random() < 0.8) {
                sphinxAttacks.push({
                    timer: 100, 
                    state: 'charging',
                    targetX: plane.x,
                    targetY: plane.y,
                    originalSx: Math.round(1200),
                    hasHit: false
                });
            }
            for (let i = sphinxAttacks.length - 1; i >= 0; i--) {
                const a = sphinxAttacks[i];
                a.timer--;
                if (a.timer > 50) a.state = 'charging';
                else if (a.timer > 0) a.state = 'firing';
                else sphinxAttacks.splice(i, 1);
            }

        } else if (currentPhase === 3) {
            ctx.fillStyle = '#020617'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = 'white'; stars.forEach(s => { s.x -= (scrollSpeed + s.s); if(s.x < 0) s.x = canvas.width; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); });
        }

        const spawnInterval = currentPhase === 1 ? 360 : (currentPhase === 2 ? 140 : 800); 
        if (currentQuestionIdx < questions.length && frameCount % spawnInterval === 0 && scrollSpeed > 0.5) {
            if (currentPhase === 1) {
                obstacles.push({ type: 'tornado', x: canvas.width + 500, timer: 0, hasHit: false });
                forceShelterOnNextMountain = true; 
            } else if (currentPhase === 2) {
                obstacles.push({ type: 'mummy', emoji: '🧟', x: canvas.width + 150, y: 150 + Math.random() * (canvas.height - 350), s: 7 });
            } else if (currentPhase === 3) {
                for (let k = 0; k < 3; k++) {
                    let yPos = 100 + Math.random() * (canvas.height - 200);
                    obstacles.push({ 
                        type: 'ufo', emoji: '🛸', x: canvas.width + 150 + (k * 120), y: yPos, s: 7.5 
                    });
                    if (k === 0 && Math.random() > 0.5) lasers.push({ x: canvas.width + 150, y: yPos, life: 60 });
                }
            }
        }

        obstacles.forEach((obs, i) => {
            if (obs.type === 'tornado') { drawStrongTornado(obs); if (obs.x < -800) obstacles.splice(i, 1); }
            else {
                obs.x -= (scrollSpeed + (obs.s || 5)); 
                if (obs.type === 'ufo' && (ufoImg.isReady || (ufoImg.complete && ufoImg.naturalWidth > 0))) {
                    const uW = 180, uH = 110;
                    ctx.drawImage(ufoImg, obs.x - uW/2, obs.y - uH/2, uW, uH);
                } else {
                    ctx.font = (obs.type === 'ufo' ? '90px' : '65px') + ' Arial'; 
                    ctx.fillText(obs.emoji, obs.x, obs.y);
                }

                const hitBoxX = obs.type === 'ufo' ? 90 : 70;
                const hitBoxY = obs.type === 'ufo' ? 60 : 50;
                if (Math.abs(obs.x - plane.x) < hitBoxX && Math.abs(obs.y - plane.y) < hitBoxY) { 
                    if (!plane.isProtected) { lives -= 0.5; triggerFlash(); obstacles.splice(i,1); updateUI(); checkGameOver(); }
                    else { obstacles.splice(i,1); }
                }
                if (obs.x < -300) obstacles.splice(i, 1);
            }
        });

        lasers.forEach((l, i) => {
            l.life--; l.x -= (scrollSpeed + 7);
            if (l.life > 0) {
                ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = "red";
                ctx.strokeStyle = `rgba(255, 0, 0, ${l.life/60})`; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(0, l.y); ctx.stroke(); ctx.restore();
                if (Math.abs(plane.y - l.y) < 30 && plane.x < l.x) { if (!plane.isProtected) { lives -= 0.1; updateUI(); checkGameOver(); } }
            } else lasers.splice(i, 1);
        });

        words.forEach((word, i) => {
            word.x -= (scrollSpeed + 2.2); 
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.roundRect(word.x, word.y-40, word.w, word.h, 15); ctx.fill();
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 5; ctx.stroke();
            ctx.fillStyle = '#1e3a8a'; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center'; ctx.fillText(word.text, word.x + word.w/2, word.y + 12);
            if (plane.x+45 > word.x && plane.x-45 < word.x+word.w && Math.abs(plane.y - word.y) < 50) {
                if (word.correct) { score += 100; currentQuestionIdx++; words = []; if (currentQuestionIdx < questions.length) { setTimeout(spawnNextQuestion, 800); updateUI(); } else startLanding(); }
                else { if (!plane.isProtected) { lives -= 1; triggerFlash(); words.splice(i, 1); updateUI(); checkGameOver(); } }
            }
            if (word.x < -300) { if(word.correct) word.x = canvas.width+200; else words.splice(i,1); }
        });

        ctx.save();
        ctx.translate(plane.x, plane.y);
        ctx.rotate(plane.angle);
        if (plane.isProtected) {
            ctx.globalAlpha = 0.8; ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#86efac'; ctx.shadowBlur = 20; ctx.shadowColor = '#4ade80';
            ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.fillText('SHIELDED', 0, -80);
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
        }

        if (planeImg.isReady || (planeImg.complete && planeImg.naturalWidth > 0)) {
            ctx.drawImage(planeImg, -plane.w / 2, -plane.h / 2, plane.w, plane.h);
        } else {
            ctx.font = '80px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('✈️', 0, 0);
        }
        
        if (frameCount % 2 === 0) { 
            ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(-plane.w/2 + 20, 20, 5 + Math.random()*7, 0, Math.PI*2); ctx.fill(); 
        }
        ctx.restore();

        if (runway) {
            runway.x -= scrollSpeed; ctx.fillStyle = '#1e293b'; ctx.fillRect(runway.x, canvas.height-140, 3500, 140);
            ctx.strokeStyle = '#facc15'; ctx.setLineDash([60, 40]); ctx.lineWidth = 10;
            ctx.beginPath(); ctx.moveTo(runway.x, canvas.height-70); ctx.lineTo(runway.x+3500, canvas.height-70); ctx.stroke();
            if (runway.x < 300) { plane.targetY = canvas.height-190; plane.targetX = runway.x + 1000; if (Math.abs(plane.y - (canvas.height-190)) < 15) { gameActive = false; setTimeout(showWin, 1000); } }
        }
        checkGameOver();
        requestAnimationFrame(gameLoop);
    }

    function startLanding() { currentPhase = 4; questionBox.innerText = "全部正確！降落機場中..."; runway = { x: canvas.width + 150 }; }
    function checkGameOver() { 
        if (lives <= 0 && gameActive) { 
            gameActive = false; 
            overlay.style.display = 'flex'; 
            overlay.innerHTML = `<h1 class="text-7xl font-black mb-8 text-red-600 italic">MAYDAY! 墜毀！</h1><p class="text-2xl mb-8 text-white">飛機已損毀，任務終止。</p><button class="btn" onclick="location.reload()">重新檢修</button>`; 
        } 
    }
    function showWin() { overlay.style.display = 'flex'; overlay.innerHTML = `<h1 class="text-7xl font-black mb-8 text-blue-400 italic">MISSION COMPLETE!</h1><p class="text-3xl font-bold text-amber-400 mb-10">最終得分: ${score}</p><button class="btn" onclick="location.reload()">再戰一場</button>`; }
    updateUI();
</script>
</body>
</html>
