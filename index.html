<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>航空英語挑戰：寫實埃及修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Microsoft JhengHei', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* UI 層確保佔滿全螢幕並使用 Flex 佈局 */
        #ui-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            box-sizing: border-box; 
            z-index: 60;
        }
        
        .stats-container { display: flex; justify-content: space-between; pointer-events: auto; }
        
        /* 題目框穩定在底部，縮小字體以適配手機 */
        #question-box { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(6px);
            border-radius: 15px; 
            padding: 10px 15px; 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); 
            margin-top: auto; 
            margin-bottom: 30px; 
            margin-left: auto;
            margin-right: auto;
            max-width: 92%; 
            pointer-events: auto; 
            border: 2px solid #3b82f6; 
            transition: all 0.3s; 
            color: #1e3a8a;
        }

        .heart { color: #ff4d4d; font-size: 28px; margin-right: 3px; }
        #overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            color: white; 
            z-index: 100; 
            pointer-events: auto; 
            text-align: center; 
            padding: 20px; 
        }
        .btn { 
            background: linear-gradient(135deg, #3b82f6, #1d4ed8); 
            color: white; 
            padding: 12px 40px; 
            border-radius: 50px; 
            font-size: 20px; 
            cursor: pointer; 
            border: none; 
            margin-top: 20px; 
            transition: transform 0.2s; 
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5); 
            touch-action: manipulation;
        }
        .damage-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.35); pointer-events: none; display: none; z-index: 50; }
        #phase-announcer { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 50px; font-weight: 900; text-shadow: 0 0 20px rgba(59, 130, 246, 0.8); pointer-events: none; opacity: 0; transition: opacity 0.5s; letter-spacing: 5px; z-index: 70; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stats-container">
        <div id="lives-display"></div>
        <div class="flex flex-col items-end">
            <div class="bg-white/90 px-3 py-1 rounded-full text-blue-600 font-bold shadow mb-1 text-sm">
                得分: <span id="score">0</span>
            </div>
            <div id="phase-tag" class="bg-black/50 px-2 py-0.5 rounded text-white text-[10px] border border-white/30 backdrop-blur-sm">
                PHASE 1: STORM TRACKING
            </div>
        </div>
    </div>
    <div id="question-box">準備起飛...</div>
</div>

<div id="phase-announcer">PHASE 1</div>

<div id="overlay">
    <h1 class="text-4xl sm:text-6xl font-black mb-6 italic bg-clip-text text-transparent bg-gradient-to-r from-amber-500 to-white uppercase">Steampunk Pilot</h1>
    <p class="text-base sm:text-xl mb-8 text-blue-100 px-4">血量總計 4 顆心！<br>龍捲風頻率已降低，避風石屋必會在暴風前出現！<br>使用手指滑動控制飛機，躲避 Sphinx 的紅色閃電。</p>
    <button class="btn" onclick="startGame()">正式起飛</button>
</div>

<div id="damage-flash" class="damage-flash"></div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const questionBox = document.getElementById('question-box');
    const scoreDisplay = document.getElementById('score');
    const livesDisplay = document.getElementById('lives-display');
    const phaseTag = document.getElementById('phase-tag');
    const announcer = document.getElementById('phase-announcer');
    const overlay = document.getElementById('overlay');
    const flash = document.getElementById('damage-flash');

    // --- 內嵌 SVG Data URL（保險機制，確保手機 100% 讀得到圖） ---
    const svgPlane = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cGF0aCBmaWxsPSIjRkZEMzAwIiBkPSJNOTIuMiAyNTZsMzc2LjgtOTYtMjYtNjQtMzg0IDE2MHoiLz48cGF0aCBmaWxsPSIjRkZBMDAwIiBkPSJNOTIuMiAyNTZsMzc2LjggOTYtMjYgNjQtMzg0LTE2MHoiLz48cGF0aCBmaWxsPSIjNDQ0IiBkPSJNMCAyMjRoMTI4djY0SDB6Ii8+PC9zdmc+';
    const svgUfo = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48ZWxsaXBzZSBjeD0iMjU2IiBjeT0iMjU2IiByeD0iMjAwIiByeT0iODAiIGZpbGw9IiM4ODgiLz48Y2lyY2xlIGN4PSIyNTYiIGN5PSIyMjAiIHI9IjYwIiBmaWxsPSIjMDBGRkZGIiBmaWxsLW9wYWNpdHk9IjAuNSIvPjwvc3ZnPg==';
    const svgSphinx = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cGF0aCBmaWxsPSIjRkZEMzAwIiBkPSJNMTI4IDQwMGgyNTZ2NjRIMSZ6Ii8+PHBhdGggZmlsbD0iI0REOTkwMCIgZD0iTTI1NiA2NGwtMTI4IDMyMGgyNTZ6Ii8+PC9zdmc+';

    // --- 強化版載入器：多層級備援 + 手機端 CORS 精準修正 ---
    function createImage(localFilename, webFallbacks, internalSvg) {
        const img = new Image();
        img.isReady = false;
        
        // 優先順序：網路備援 -> 本地 -> 內嵌SVG
        let urls = [...webFallbacks, localFilename, internalSvg];
        let index = 0;

        const tryLoad = () => {
            if (index >= urls.length) return;
            
            let currentUrl = urls[index];
            
            // 針對手機端：除非是內嵌或本地，否則移除 crossOrigin 以提高相容性
            if (currentUrl.startsWith('http')) {
                // 部分手機瀏覽器對 Data URL 加 crossOrigin 會報錯，因此僅對 http 加
                // 但為了 drawImage 成功率，我們在此移除 crossOrigin 設定，因為不需處理像素
                img.removeAttribute('crossOrigin');
                // 快取擊穿
                currentUrl += (currentUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
            } else {
                img.removeAttribute('crossOrigin');
            }
            
            img.src = currentUrl;
        };

        img.onload = () => {
            if (img.naturalWidth > 0) {
                img.isReady = true;
                console.log(`成功載入圖檔: ${img.src.substring(0, 30)}...`);
            } else {
                handleError();
            }
        };

        const handleError = () => {
            index++;
            if (index < urls.length) tryLoad();
            else console.warn("所有圖檔載入失效，將使用預設 Emoji 備援。");
        };

        img.onerror = handleError;
        tryLoad();
        return img;
    }

    // 資源列表
    const planeImg = createImage('plane.png', [
        'https://i.ibb.co/V9m8S9n/steampunk-plane.png',
        'https://static.thenounproject.com/png/1138241-200.png'
    ], svgPlane); 
    const sphinxImg = createImage('sphinx.png', [
        'https://i.ibb.co/L5hY8pS/sphinx.png',
        'https://i.postimg.cc/mD8GjQ6f/sphinx.png'
    ], svgSphinx); 
    const ufoImg = createImage('ufo.png', [
        'https://i.ibb.co/6P0qL9r/ufo.png',
        'https://img.icons8.com/color/512/ufo.png'
    ], svgUfo);

    let gameActive = false;
    let score = 0;
    let lives = 4; 
    let currentQuestionIdx = 0;
    let plane = { x: 80, y: 80, w: 140, h: 80, targetX: 80, targetY: 80, angle: 0, isProtected: false };
    
    let obstacles = [];
    let words = [];
    let mountains = [];
    let backMountains = [];
    let stars = [];
    let lasers = [];
    let sphinxAttacks = []; 
    let runway = null;
    let frameCount = 0;
    let currentPhase = 1;
    let sphinxScrollX = 0;
    let scrollSpeed = 0; 
    let forceShelterOnNextMountain = false;
    let mountainsSinceLastShelter = 0;

    const questions = [
        { q: "I want to ________ an apple.", options: ["eat", "drink"], correct: "eat" },
        { q: "The bird is ________ in the sky.", options: ["swimming", "flying"], correct: "flying" },
        { q: "She ________ to school every day.", options: ["goes", "go"], correct: "goes" },
        { q: "Look! It is ________ now.", options: ["raining", "sunny"], correct: "raining" },
        { q: "I like to ________ music.", options: ["listen", "watch"], correct: "listen" },
        { q: "My father ________ a doctor.", options: ["is", "are"], correct: "is" },
        { q: "They ________ playing soccer.", options: ["are", "am"], correct: "are" },
        { q: "We ________ to the park yesterday.", options: ["went", "go"], correct: "went" },
        { q: "Can you ________ me a hand?", options: ["give", "take"], correct: "give" },
        { q: "He is ________ than me.", options: ["taller", "tall"], correct: "taller" },
        { q: "Where ________ you from?", options: ["are", "is"], correct: "are" },
        { q: "This is ________ eraser.", options: ["an", "a"], correct: "an" },
        { q: "Don't ________ in the library.", options: ["shout", "read"], correct: "shout" },
        { q: "How ________ is this book?", options: ["much", "many"], correct: "much" },
        { q: "There ________ some milk.", options: ["is", "are"], correct: "is" },
        { q: "I ________ finished my homework.", options: ["have", "has"], correct: "have" },
        { q: "Please ________ your shoes.", options: ["remove", "open"], correct: "remove" },
        { q: "She is ________ English now.", options: ["studying", "study"], correct: "studying" },
        { q: "It's time ________ go to bed.", options: ["to", "for"], correct: "to" },
        { q: "Would you like ________ tea?", options: ["some", "any"], correct: "some" },
        { q: "I don't have ________ money.", options: ["any", "some"], correct: "any" },
        { q: "That is the ________ beautiful girl.", options: ["most", "more"], correct: "most" },
        { q: "If it ________ tomorrow, we'll stay home.", options: ["rains", "rain"], correct: "rains" },
        { q: "Have you ________ been to Japan?", options: ["ever", "never"], correct: "ever" },
        { q: "Success ________ hard work.", options: ["needs", "eat"], correct: "needs" }
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initMountains();
    }

    function initMountains() {
        mountains = []; backMountains = [];
        const count = 18; const step = canvas.width / (count - 1);
        for(let i=0; i<count + 10; i++) {
            backMountains.push({ x: i * step, h: 80 + Math.random() * 120 });
            mountains.push(generateOneMountain(i * step, i < 8 ? false : null));
        }
    }

    function generateOneMountain(xValue, forced = null) {
        let spawnShelter = false;
        if (forced !== null) spawnShelter = forced;
        else if (forceShelterOnNextMountain) { spawnShelter = true; forceShelterOnNextMountain = false; }
        else { if (mountainsSinceLastShelter > 8) spawnShelter = Math.random() > 0.93; }
        if (spawnShelter) mountainsSinceLastShelter = 0; else mountainsSinceLastShelter++;
        return { x: xValue, h: 150 + Math.random() * 250, seed: Math.random(), isSharp: Math.random() > 0.7, hasShelter: spawnShelter };
    }

    window.addEventListener('resize', resize);
    // 增加對手機旋轉螢幕的支援
    window.addEventListener('orientationchange', () => { setTimeout(resize, 200); });
    resize();

    window.addEventListener('mousemove', (e) => {
        if (!gameActive) return; plane.targetX = e.clientX; plane.targetY = e.clientY;
    });

    // 手機端精準操控修復
    const handleTouch = (e) => {
        if (!gameActive) return;
        const touch = e.touches[0];
        plane.targetX = touch.clientX; plane.targetY = touch.clientY;
        if (e.cancelable) e.preventDefault();
    };
    window.addEventListener('touchstart', handleTouch, {passive: false});
    window.addEventListener('touchmove', handleTouch, {passive: false});

    function startGame() {
        gameActive = true; score = 0; lives = 4; currentQuestionIdx = 0; currentPhase = 1;
        obstacles = []; words = []; lasers = []; sphinxAttacks = []; runway = null; sphinxScrollX = 0;
        scrollSpeed = 0; frameCount = 0; forceShelterOnNextMountain = false; mountainsSinceLastShelter = 0;
        overlay.style.display = 'none';
        plane.x = 80; plane.y = 80; plane.targetX = 80; plane.targetY = 80;
        plane.isProtected = false;
        stars = Array.from({length: 100}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2.5 }));
        announcePhase(1); updateUI(); spawnNextQuestion();
        requestAnimationFrame(gameLoop);
    }

    function announcePhase(p) {
        currentPhase = p;
        announcer.innerText = `PHASE ${p}`; announcer.style.opacity = '1';
        setTimeout(() => announcer.style.opacity = '0', 2000);
        if(p===1) phaseTag.innerText = "Phase 1: Storm Tracking";
        if(p===2) phaseTag.innerText = "Phase 2: Sphinx Ruins";
        if(p===3) phaseTag.innerText = "Phase 3: Cosmic Void";
    }

    function updateUI() {
        scoreDisplay.innerText = score;
        livesDisplay.innerHTML = '❤️'.repeat(Math.max(0, Math.floor(lives))).split('').map(h => `<span class="heart">${h}</span>`).join('');
        if (currentQuestionIdx < questions.length) questionBox.innerText = questions[currentQuestionIdx].q;
    }

    function spawnNextQuestion() {
        if (currentQuestionIdx >= questions.length) return;
        if (currentQuestionIdx === 10 && currentPhase === 1) announcePhase(2);
        if (currentQuestionIdx === 17 && currentPhase === 2) announcePhase(3);
        words = []; 
        const q = questions[currentQuestionIdx];
        q.options.forEach((opt, i) => {
            words.push({ text: opt, x: canvas.width + 400 + (i * 500), y: 100 + Math.random() * (canvas.height * 0.3), w: 110, h: 40, correct: opt === q.correct });
        });
    }

    function triggerFlash() { flash.style.display = 'block'; setTimeout(() => flash.style.display = 'none', 150); }

    function drawPeakShelter(mountX, mountY) {
        const sw = 130, sh = 105; const houseY = mountY - sh;
        ctx.save(); ctx.translate(mountX, houseY);
        ctx.shadowBlur = 30; ctx.shadowColor = '#4ade80'; ctx.fillStyle = '#525252'; 
        ctx.beginPath(); ctx.roundRect(-sw/2, 0, sw, sh, 2); ctx.fill();
        ctx.shadowBlur = 0; ctx.fillStyle = '#3f3f3f';
        for(let r=0; r<4; r++) { for(let c=0; c<3; c++) { ctx.fillRect(-sw/2 + 8 + (c*42), 10 + (r*24), 30, 18); } }
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-sw/2 - 15, 0, sw + 30, 15); 
        ctx.fillStyle = '#86efac'; ctx.shadowBlur = 15; ctx.shadowColor = '#4ade80'; ctx.fillRect(-28, 35, 56, sh - 35);
        ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.fillText('REFUGE', 0, -15);
        ctx.restore();
        if (plane.x > mountX - sw/2 && plane.x < mountX + sw/2 && plane.y > houseY && plane.y < mountY) plane.isProtected = true;
    }

    function drawRealisticMountains() {
        const groundY = canvas.height; ctx.fillStyle = 'rgba(101, 67, 33, 0.4)';
        ctx.beginPath(); ctx.moveTo(0, groundY);
        backMountains.forEach(m => { m.x -= (scrollSpeed * 0.3); ctx.lineTo(m.x, groundY - m.h); });
        ctx.lineTo(canvas.width + 500, groundY); ctx.fill();
        if (backMountains.length > 0 && backMountains[0].x < -150) {
            let last = backMountains[backMountains.length - 1]; backMountains.shift();
            backMountains.push({ x: last.x + (canvas.width/14), h: 80 + Math.random() * 120 });
        }
        for (let i = 0; i < mountains.length - 1; i++) {
            let p1 = mountains[i]; let p2 = mountains[i+1]; p1.x -= scrollSpeed;
            let midX = (p1.x + p2.x) / 2; let peakY = groundY - Math.max(p1.h, p2.h); if (p1.isSharp) peakY -= 50;
            let mGrad = ctx.createLinearGradient(0, peakY, 0, groundY); mGrad.addColorStop(0, '#78350f'); mGrad.addColorStop(1, '#331a00'); 
            ctx.fillStyle = mGrad; ctx.beginPath(); ctx.moveTo(p1.x, groundY); ctx.lineTo(p1.x, groundY - p1.h);
            if (p1.isSharp) ctx.lineTo(midX, peakY - 20); else ctx.lineTo(midX, peakY);
            ctx.lineTo(p2.x, groundY - p2.h); ctx.lineTo(p2.x, groundY); ctx.fill();
            if (p1.hasShelter) drawPeakShelter(midX, peakY);
        }
        if (mountains.length > 0 && mountains[0].x < -450) {
            let last = mountains[mountains.length - 1]; mountains.shift();
            mountains.push(generateOneMountain(last.x + (canvas.width/14)));
        }
    }

    function drawStrongTornado(obs) {
        obs.x -= (scrollSpeed + 2.8); obs.timer = (obs.timer || 0) + 1;
        const height = canvas.height * 1.3; ctx.save();
        for (let i = 0; i < 15; i++) {
            const hRatio = i / 15; const currentY = canvas.height - (hRatio * height);
            const sway = Math.sin(obs.timer * 0.05 + hRatio * 5) * 50; const swirlWidth = 100 * (1 + hRatio * 4);
            ctx.beginPath(); ctx.strokeStyle = `rgba(180, 180, 200, ${0.2 + (1 - hRatio) * 0.4})`;
            ctx.ellipse(obs.x + sway, currentY, swirlWidth, 15, (obs.timer * 0.18) + i, 0, Math.PI * 2); ctx.stroke();
            if (Math.abs(currentY - plane.y) < 40) obs.lastSway = sway;
        }
        ctx.restore();
        if (Math.abs(plane.x - (obs.x + (obs.lastSway || 0))) < 150) {
            if (!plane.isProtected && !obs.hasHit) { lives -= 1; obs.hasHit = true; triggerFlash(); updateUI(); checkGameOver(); }
        }
    }

    function drawGizaSphinxRealistic(offsetX) {
        const groundY = canvas.height - 80; ctx.save(); ctx.translate(-offsetX % (canvas.width * 2.5), 0);
        for(let loop = 0; loop < 2; loop++) {
            const startX = loop*(canvas.width * 2.5) + 400;
            const sx = startX + 800, sy = groundY;
            if (sphinxImg.isReady || (sphinxImg.complete && sphinxImg.naturalWidth > 0)) {
                ctx.drawImage(sphinxImg, sx - 300, sy - 400, 600, 400);
            } else {
                ctx.fillStyle = '#92400e'; ctx.fillRect(sx - 260, sy - 180, 520, 190);
                ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(sx, sy - 330, 110, 0, Math.PI * 2); ctx.fill();
            }
            const attack = sphinxAttacks.find(a => Math.abs(a.originalSx - (loop*(canvas.width * 2.5) + 1200)) < 150);
            if (attack) {
                const eyeY = sy - 340, eyeL = sx - 30, eyeR = sx + 30;
                if (attack.state === 'charging') {
                    ctx.fillStyle = 'yellow'; ctx.beginPath(); ctx.arc(eyeL, eyeY, 10, 0, 7); ctx.arc(eyeR, eyeY, 10, 0, 7); ctx.fill();
                } else if (attack.state === 'firing') {
                    ctx.strokeStyle = 'red'; ctx.lineWidth = 4; ctx.beginPath(); 
                    ctx.moveTo(eyeL, eyeY); ctx.lineTo(attack.targetX, attack.targetY); ctx.moveTo(eyeR, eyeY); ctx.lineTo(attack.targetX, attack.targetY); ctx.stroke();
                    if (!plane.isProtected && !attack.hasHit && Math.hypot(plane.x - attack.targetX, plane.y - attack.targetY) < 50) {
                        lives -= 0.5; attack.hasHit = true; triggerFlash(); updateUI(); checkGameOver();
                    }
                }
            }
        }
        ctx.restore();
    }

    function gameLoop() {
        if (!gameActive) return; frameCount++; ctx.clearRect(0, 0, canvas.width, canvas.height);
        plane.isProtected = false; 
        let dx = (plane.targetX - plane.x) * 0.1; let dy = (plane.targetY - plane.y) * 0.1;
        scrollSpeed = dx > 0 ? dx * 1.6 : 0; 
        plane.x += dx; plane.y += dy; plane.angle = dy * 0.06;
        plane.x = Math.max(40, Math.min(canvas.width - 40, plane.x)); plane.y = Math.max(40, Math.min(canvas.height - 40, plane.y));

        if (currentPhase === 1) {
            let g = ctx.createLinearGradient(0,0,0,canvas.height); g.addColorStop(0, '#0c4a6e'); g.addColorStop(1, '#bae6fd');
            ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width, canvas.height); drawRealisticMountains();
            if (frameCount % 720 === 240 && scrollSpeed > 0.5) forceShelterOnNextMountain = true;
        } else if (currentPhase === 2) {
            ctx.fillStyle = '#fef3c7'; ctx.fillRect(0,0,canvas.width, canvas.height);
            sphinxScrollX += scrollSpeed; drawGizaSphinxRealistic(sphinxScrollX);
            if (frameCount % 320 === 0 && Math.random() < 0.8) sphinxAttacks.push({ timer: 100, state: 'charging', targetX: plane.x, targetY: plane.y, originalSx: 1200, hasHit: false });
            for (let i = sphinxAttacks.length - 1; i >= 0; i--) {
                const a = sphinxAttacks[i]; a.timer--;
                if (a.timer > 50) { a.state = 'charging'; a.targetX = plane.x; a.targetY = plane.y; }
                else if (a.timer > 0) a.state = 'firing'; else sphinxAttacks.splice(i, 1);
            }
        } else if (currentPhase === 3) {
            ctx.fillStyle = '#020617'; ctx.fillRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => { s.x -= (scrollSpeed + s.s); if(s.x < 0) s.x = canvas.width; ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill(); });
        }

        const spawnInterval = currentPhase === 1 ? 720 : (currentPhase === 2 ? 140 : 800); 
        if (currentQuestionIdx < questions.length && frameCount % spawnInterval === 0 && scrollSpeed > 0.5) {
            if (currentPhase === 1) obstacles.push({ type: 'tornado', x: canvas.width + 1200, timer: 0, hasHit: false });
            else if (currentPhase === 2) obstacles.push({ type: 'mummy', emoji: '🧟', x: canvas.width + 150, y: 150 + Math.random() * (canvas.height - 350), s: 3.5 });
            else if (currentPhase === 3) {
                for (let k = 0; k < 3; k++) obstacles.push({ type: 'ufo', emoji: '🛸', x: canvas.width + 150 + (k * 120), y: 100 + Math.random() * (canvas.height - 200), s: 7.5 });
            }
        }

        obstacles.forEach((obs, i) => {
            obs.x -= (scrollSpeed + (obs.s || 5)); 
            if (obs.type === 'tornado') drawStrongTornado(obs);
            else if (obs.type === 'ufo' && ufoImg.isReady) ctx.drawImage(ufoImg, obs.x - 90, obs.y - 55, 180, 110);
            else { ctx.font = '65px Arial'; ctx.fillText(obs.emoji, obs.x, obs.y); }
            if (obs.type !== 'tornado' && Math.hypot(obs.x - plane.x, obs.y - plane.y) < 70) {
                if (!plane.isProtected) { lives -= 0.5; triggerFlash(); updateUI(); }
                obstacles.splice(i, 1);
            }
            if (obs.x < -300) obstacles.splice(i, 1);
        });

        words.forEach((word, i) => {
            word.x -= (scrollSpeed + 2.2); ctx.fillStyle = 'white'; ctx.beginPath(); ctx.roundRect(word.x, word.y-20, word.w, word.h, 10); ctx.fill();
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = '#1e3a8a'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center'; ctx.fillText(word.text, word.x + word.w/2, word.y + 6);
            if (plane.x+35 > word.x && plane.x-35 < word.x+word.w && Math.abs(plane.y - word.y) < 30) {
                if (word.correct) { score += 100; currentQuestionIdx++; words = []; if (currentQuestionIdx < questions.length) { setTimeout(spawnNextQuestion, 800); updateUI(); } else startLanding(); }
                else { if (!plane.isProtected) { lives -= 1; triggerFlash(); updateUI(); } words.splice(i, 1); }
            }
            if (word.x < -300) { if(word.correct) word.x = canvas.width+200; else words.splice(i,1); }
        });

        ctx.save(); ctx.translate(plane.x, plane.y); ctx.rotate(plane.angle);
        if (plane.isProtected) { ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(0, 0, 85, 0, 7); ctx.stroke(); }
        if (planeImg.isReady) ctx.drawImage(planeImg, -70, -40, 140, 80);
        else { ctx.font = '80px Arial'; ctx.textAlign = 'center'; ctx.fillText('✈️', 0, 0); }
        ctx.restore();

        if (runway) {
            runway.x -= scrollSpeed; ctx.fillStyle = '#1e293b'; ctx.fillRect(runway.x, canvas.height-140, 3500, 140);
            if (runway.x < 300) { plane.targetY = canvas.height-190; if (Math.abs(plane.y - (canvas.height-190)) < 15) { gameActive = false; setTimeout(showWin, 1000); } }
        }
        checkGameOver(); requestAnimationFrame(gameLoop);
    }

    function checkGameOver() { 
        if (lives <= 0 && gameActive) { 
            gameActive = false; overlay.style.display = 'flex'; 
            overlay.innerHTML = `<h1 class="text-3xl sm:text-5xl font-black mb-8 text-red-600 italic uppercase">Mayday! 墜毀！</h1><button class="btn" onclick="location.reload()">重新檢修</button>`; 
        } 
    }
    function showWin() { overlay.style.display = 'flex'; overlay.innerHTML = `<h1 class="text-3xl sm:text-5xl font-black mb-8 text-blue-400 italic uppercase">Mission Complete!</h1><p class="text-xl font-bold text-amber-400 mb-10">最終得分: ${score}</p><button class="btn" onclick="location.reload()">再戰一場</button>`; }
    updateUI();
</script>
</body>
